<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artelligence OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: hsl(240, 10%, 3.9%);
            color: white;
            font-family: 'Readex Pro', 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Glow orb behind logo */
        .glow-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(138, 43, 226, 0.2) 0%, rgba(0, 191, 255, 0.06) 40%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            from { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            to   { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
        }

        .logo-wrap {
            position: relative;
            z-index: 1;
        }

        .logo-wrap svg {
            width: 72px;
            height: 72px;
            fill: hsl(263.4, 70%, 50.4%);
            filter: drop-shadow(0 0 20px hsl(263.4, 70%, 50.4%));
            animation: logoPulse 2.5s ease-in-out infinite alternate;
        }

        @keyframes logoPulse {
            from { filter: drop-shadow(0 0 15px hsla(263.4, 70%, 50.4%, 0.5)); }
            to   { filter: drop-shadow(0 0 30px hsla(263.4, 70%, 50.4%, 0.9)); }
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, hsl(0, 0%, 98%) 30%, hsl(263.4, 70%, 50.4%) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
        }

        .tagline {
            font-size: 0.8rem;
            color: hsl(240, 5%, 55%);
            letter-spacing: 0.5px;
            z-index: 1;
        }

        /* Loading bar */
        .loader-track {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            z-index: 1;
            margin-top: 0.5rem;
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, hsl(263.4, 70%, 50.4%), hsl(199, 89%, 48%));
            border-radius: 4px;
            animation: load 2.4s ease-in-out forwards;
        }

        @keyframes load {
            0%   { width: 0%; }
            30%  { width: 35%; }
            60%  { width: 65%; }
            85%  { width: 88%; }
            100% { width: 100%; }
        }

        .version {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: hsl(240, 5%, 35%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>

    <div class="splash-container">
        <div class="logo-wrap">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">

                <path fill="currentColor" d="M329.131958,594.107788 C351.697571,574.475952 384.033905,576.237671 403.406799,597.897278 C422.106720,618.804443 420.518250,651.789124 399.889343,670.937988 C379.275238,690.073120 346.479889,689.201843 327.319305,669.009949 C306.464844,647.033020 307.115692,615.752625 329.131958,594.107788 Z"/>

        <p class="tagline">Unified Digital Workspace</p>

        <div class="loader-track">

        </div>
    </div>

    <span class="version">v1.0.0</span>
</body>
</html>
